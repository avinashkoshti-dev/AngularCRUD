<div class="container mt-4">
  <div class="row">

    <!-- TABLE SECTION -->
    <div class="col-8">
      <div class="card bg-warning p-3">
        <h4>Student List</h4>

        <table class="table table-bordered mt-3">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Mobile</th>
              <th>Email</th>
              <th>City</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let s of studentList">
              <td>{{s.studentId}}</td>
              <td>{{s.studName}}</td>
              <td>{{s.mobileNo}}</td>
              <td>{{s.email}}</td>
              <td>{{s.city}}</td>
              <td>
                <button class="btn btn-sm btn-primary" >Edit</button>
                <button class="btn btn-sm btn-danger" >Delete</button>
              </td>
            </tr>
          </tbody>
        </table>

      </div>
    </div>

    <!-- FORM SECTION -->
    <div class="col-4">
      <div class="card bg-warning p-3">
        <h4>Student Form</h4>

        <!-- <form (ngSubmit)="saveStudent()"> -->
          <form >
          <input type="hidden" [(ngModel)]="student.studentId" name="studentId">

          <div class="mb-2">
            <input type="text" class="form-control" [(ngModel)]="student.studName" name="studName" placeholder="Name">
          </div>

          <div class="mb-2">
            <input type="text" class="form-control" [(ngModel)]="student.mobileNo" name="mobileNo" placeholder="Mobile">
          </div>

          <div class="mb-2">
            <input type="email" class="form-control" [(ngModel)]="student.email" name="email" placeholder="Email">
          </div>

          <div class="mb-2">
            <input type="text" class="form-control" [(ngModel)]="student.city" name="city" placeholder="City">
          </div>

          <div class="mb-2">
            <input type="text" class="form-control" [(ngModel)]="student.state" name="state" placeholder="State">
          </div>

          <div class="mb-2">
            <input type="text" class="form-control" [(ngModel)]="student.pincode" name="pincode" placeholder="Pincode">
          </div>

          <div class="mb-2">
            <input type="text" class="form-control" [(ngModel)]="student.addressLine1" name="addressLine1" placeholder="Address 1">
          </div>

          <div class="mb-2">
            <input type="text" class="form-control" [(ngModel)]="student.addressLine2" name="addressLine2" placeholder="Address 2">
          </div>

          <button class="btn btn-success w-100">Save</button>
        </form>

      </div>
    </div>

  </div>
</div>
